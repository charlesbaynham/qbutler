### Documentation ###

# Upload the documentation to pages if it's a tagged commit
pages:
  extends: .py_venv
  stage: Publish Pages
  needs: []
  script:
  - poetry run sphinx-build docs public -b html
  artifacts:
    paths:
    - public
  rules:
  - if: $CI_COMMIT_TAG
    when: always
  - if: $CI_COMMIT_BRANCH == "master"
    when: always

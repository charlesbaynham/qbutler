# Default image, if not specified
image: python:3.9

stages:
- Static Analysis
- Test
- Build Release
- Publish Pages

cache:
  key: ${CI_JOB_NAME}
  paths:
  - .venv
  - .pipcache

variables:
  # Change pip's cache directory to be inside the project directory since we can only cache local items.
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.pipcache

# Make a template for steps that use a python virtual env
.py_venv:
  before_script:
    # Store the CI_JOB_TOKEN so that jobs can access other repositories with the access rights of the triggering user:
  - echo -e "machine ${CI_SERVER_HOST}\nlogin gitlab-ci-token\npassword ${CI_JOB_TOKEN}" > ~/.netrc
    # Set up git so that test commits don't fail
  - echo [user] > ~/.gitconfig
  - echo name = Gitlabs CI Testing >> ~/.gitconfig
  - echo email = test@example.com >> ~/.gitconfig
  - python --version
  - pip install poetry
  - poetry config virtualenvs.in-project true
  - poetry install

### Linting ###

pre-commit:
  extends: .py_venv
  stage: Static Analysis
  script:
  - poetry run pre-commit run --all
  allow_failure: true
  needs: []

### Testing ###

test:
  extends: .py_venv
  stage: Test
  script:
  - poetry run pytest --runslow
  needs: []

